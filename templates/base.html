<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="{{CANONICAL}}" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{TITLE}}" />
  <meta property="og:description" content="{{DESCRIPTION}}" />
  <meta property="og:url" content="{{CANONICAL}}" />

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --text: #f8fafc;
      --accent: #3b82f6;
      --border: #1f2937;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: var(--text);
      line-height: 1.6;
    }
    a { color: #93c5fd; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }
    header {
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      padding-bottom: 16px;
    }
    .brand {
      font-size: 28px;
      font-weight: bold;
      color: white;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 6px;
    }
    .card {
      background: rgba(17,24,39,.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .search {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    input[type="text"] {
      flex: 1;
      min-width: 240px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
    }
    button {
      padding: 14px 18px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .muted { color: var(--muted); }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #1e3a8a;
      font-size: 12px;
      font-weight: bold;
    }
    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }
    ul.clean {
      margin: 0;
      padding-left: 18px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand"><a href="/">Hiato Literário</a></div>
      <div class="subtitle">Dicionário, gramática e análise de palavras</div>
    </header>

    {{CONTENT}}

    <footer>
      Projeto estático preparado para SEO e indexação por palavra.
    </footer>
  </div>
</body>
</html>
